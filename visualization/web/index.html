<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM PID Tuner Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- ECharts for visualization -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <!-- roslib.js for ROS communication -->
    <script src="https://cdn.jsdelivr.net/npm/roslib@1.3.0/build/roslib.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🤖 LLM PID 自动调参系统</h1>
            <div class="connection-status" id="connection-status">
                <span class="status-dot"></span>
                <span class="status-text">未连接</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Left Panel: Charts -->
            <div class="left-panel">
                <!-- Error Chart -->
                <div class="chart-container">
                    <h2>实时误差曲线</h2>
                    <div id="error-chart" class="chart"></div>
                </div>

                <!-- PID Parameters Chart -->
                <div class="chart-container">
                    <h2>PID 参数历史</h2>
                    <div id="params-chart" class="chart"></div>
                </div>
            </div>

            <!-- Right Panel: Controls -->
            <div class="right-panel">
                <!-- Controller Selection -->
                <div class="control-panel">
                    <h2>控制器选择</h2>
                    <div class="form-group">
                        <label for="controller-select">控制器</label>
                        <select id="controller-select">
                            <option value="gimbal_controller">云台控制器</option>
                            <option value="chassis_controller">底盘控制器</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="joint-select">关节</label>
                        <select id="joint-select">
                            <option value="yaw">Yaw</option>
                            <option value="pitch">Pitch</option>
                        </select>
                    </div>
                </div>

                <!-- Current Status -->
                <div class="status-panel">
                    <h2>当前状态</h2>
                    <div class="status-grid">
                        <div class="status-item">
                            <span class="label">状态</span>
                            <span class="value" id="tuning-status">IDLE</span>
                        </div>
                        <div class="status-item">
                            <span class="label">轮数</span>
                            <span class="value" id="round-info">0 / 30</span>
                        </div>
                        <div class="status-item">
                            <span class="label">平均误差</span>
                            <span class="value" id="avg-error">0.00</span>
                        </div>
                        <div class="status-item">
                            <span class="label">最大误差</span>
                            <span class="value" id="max-error">0.00</span>
                        </div>
                    </div>
                </div>

                <!-- PID Parameters -->
                <div class="params-panel">
                    <h2>PID 参数</h2>
                    <div class="params-sliders">
                        <div class="param-group">
                            <label>Kp</label>
                            <input type="range" id="kp-slider" min="0" max="100" step="0.1" value="1.0">
                            <span id="kp-value">1.0</span>
                        </div>
                        <div class="param-group">
                            <label>Ki</label>
                            <input type="range" id="ki-slider" min="0" max="10" step="0.01" value="0.1">
                            <span id="ki-value">0.1</span>
                        </div>
                        <div class="param-group">
                            <label>Kd</label>
                            <input type="range" id="kd-slider" min="0" max="10" step="0.01" value="0.05">
                            <span id="kd-value">0.05</span>
                        </div>
                    </div>
                    <button class="btn btn-primary" id="apply-params-btn">应用参数</button>
                </div>

                <!-- Tuning Controls -->
                <div class="tuning-controls">
                    <h2>调参控制</h2>
                    <div class="form-group">
                        <label for="target-setpoint">目标值</label>
                        <input type="number" id="target-setpoint" value="0.0" step="0.1">
                    </div>
                    <div class="form-group">
                        <label for="max-rounds">最大轮数</label>
                        <input type="number" id="max-rounds" value="30" min="1" max="100">
                    </div>
                    <div class="form-group checkbox">
                        <input type="checkbox" id="conservative-mode" checked>
                        <label for="conservative-mode">保守模式</label>
                    </div>
                    <div class="button-group">
                        <button class="btn btn-success" id="start-tuning-btn">开始调参</button>
                        <button class="btn btn-danger" id="stop-tuning-btn" disabled>停止调参</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Log Panel -->
        <div class="log-panel">
            <h2>调参日志</h2>
            <div class="log-container" id="log-container">
                <div class="log-entry info">系统就绪，等待连接...</div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
