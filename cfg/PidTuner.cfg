#!/usr/bin/env python
# -*- coding: utf-8 -*-

PACKAGE = "rm_pid_tuner"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

# Tuning Mode
tuning_mode_enum = gen.enum([
    gen.const("IDLE", int_t, 0, "Idle mode - not tuning"),
    gen.const("TUNING", int_t, 1, "Active tuning in progress"),
    gen.const("PAUSED", int_t, 2, "Tuning paused"),
], "Tuning mode")

gen.add("tuning_mode", int_t, 0, "Current tuning mode", 0, 0, 2, edit_method=tuning_mode_enum)

# Tuning Parameters
gen.add("buffer_size", int_t, 0, "Data buffer size for analysis", 25, 10, 100)
gen.add("max_rounds", int_t, 0, "Maximum tuning rounds", 30, 1, 100)
gen.add("min_error_threshold", double_t, 0, "Minimum error threshold for completion", 0.3, 0.01, 10.0)

# Conservative Mode
gen.add("conservative_mode", bool_t, 0, "Use conservative tuning (PI + reduced gain)", True)
gen.add("z_n_gain_factor", double_t, 0, "Ziegler-Nichols gain reduction factor", 0.5, 0.1, 1.0)

# Parameter Change Limits
gen.add("max_p_change", double_t, 0, "Maximum P change ratio per round", 0.5, 0.1, 2.0)
gen.add("max_i_change", double_t, 0, "Maximum I change ratio per round", 0.5, 0.1, 2.0)
gen.add("max_d_change", double_t, 0, "Maximum D change ratio per round", 0.5, 0.1, 2.0)

# LLM Parameters
gen.add("llm_temperature", double_t, 0, "LLM temperature for response randomness", 0.3, 0.0, 1.0)
gen.add("llm_timeout", double_t, 0, "LLM API timeout in seconds", 60.0, 10.0, 120.0)

# Safety Limits
gen.add("p_max", double_t, 0, "Maximum allowed P value", 100.0, 1.0, 1000.0)
gen.add("i_max", double_t, 0, "Maximum allowed I value", 10.0, 0.1, 100.0)
gen.add("d_max", double_t, 0, "Maximum allowed D value", 10.0, 0.1, 100.0)

exit(gen.generate(PACKAGE, "pid_tuner", "PidTuner"))
